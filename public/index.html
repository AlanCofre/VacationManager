<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacation Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Vacation Manager</h1>
      <p>Automatización simple de solicitudes de vacaciones</p>
    </header>

    <section id="loginView" class="card">
      <h2>Iniciar sesión</h2>
      <form id="loginForm">
        <div class="field">
          <label for="email">Correo</label>
          <input type="email" id="email" required />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required />
        </div>
        <button type="submit" class="btn primary">Ingresar</button>
      </form>
      <p id="loginMensaje" class="mensaje"></p>
    </section>

    <section id="trabajadorView" class="hidden">
      <div class="card">
        <div class="panel-top">
          <div>
            <h2>Panel Trabajador</h2>
            <p id="workerInfo"></p>
          </div>
          <button class="btn secondary" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>

        <form id="solicitudForm">
          <div class="field">
            <label for="fecha_inicio">Fecha de inicio</label>
            <input type="date" id="fecha_inicio" required />
          </div>

          <div class="field">
            <label for="fecha_fin">Fecha de fin</label>
            <input type="date" id="fecha_fin" required />
          </div>

          <div class="field">
            <label for="comentario">Comentario</label>
            <textarea id="comentario" rows="4"></textarea>
          </div>

          <button type="submit" class="btn primary">Enviar solicitud</button>
        </form>

        <p id="workerMensaje" class="mensaje"></p>
      </div>

      <div class="card mt">
        <h2>Mi solicitud</h2>
        <div id="miSolicitud"></div>
      </div>
    </section>

    <section id="jefeView" class="hidden">
      <div class="card">
        <div class="panel-top">
          <div>
            <h2>Panel Jefe</h2>
            <p id="bossInfo"></p>
          </div>
          <button class="btn secondary" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>

        <button id="recargarBtn" class="btn primary">Recargar solicitudes</button>
        <div id="solicitudesLista" class="solicitudes-lista"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
