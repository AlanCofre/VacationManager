<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vacation Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Vacation Manager</h1>
      <p>Automatización simple de solicitudes de vacaciones</p>
    </header>

    <section id="loginView" class="card">
      <h2>Iniciar sesión</h2>
      <form id="loginForm">
        <div class="field">
          <label for="email">Correo</label>
          <input type="email" id="email" required />
        </div>
        <div class="field">
          <label for="password">Contraseña</label>
          <input type="password" id="password" required />
        </div>
        <button type="submit" class="btn primary">Ingresar</button>
      </form>

      <p id="loginMensaje" class="mensaje"></p>

      <p>
        ¿No tienes cuenta?
        <button id="showRegisterBtn" type="button" class="btn secondary">Regístrate</button>
      </p>

      <p>
        ¿Olvidaste tu contraseña?
        <button id="showForgotBtn" type="button" class="btn secondary">Recuperarla</button>
      </p>
    </section>

    <section id="registerView" class="card hidden">
      <h2>Registro de usuario</h2>
      <form id="registerForm">
        <div class="field">
          <label for="registerNombre">Nombre</label>
          <input type="text" id="registerNombre" required />
        </div>
        <div class="field">
          <label for="registerEmail">Correo</label>
          <input type="email" id="registerEmail" required />
        </div>
        <div class="field">
          <label for="registerPassword">Contraseña</label>
          <input type="password" id="registerPassword" required />
        </div>
        <div class="field">
          <label for="registerRol">Rol</label>
          <select id="registerRol" required>
            <option value="TRABAJADOR">TRABAJADOR</option>
            <option value="JEFE">JEFE</option>
          </select>
        </div>
        <button type="submit" class="btn primary">Crear cuenta</button>
      </form>

      <p id="registerMensaje" class="mensaje"></p>

      <p>
        ¿Ya tienes cuenta?
        <button id="showLoginBtn" type="button" class="btn secondary">Iniciar sesión</button>
      </p>
    </section>

    <section id="forgotPasswordView" class="card hidden">
      <h2>Recuperar contraseña</h2>
      <form id="forgotForm">
        <div class="field">
          <label for="forgotEmail">Correo</label>
          <input type="email" id="forgotEmail" required />
        </div>
        <button type="submit" class="btn primary">Enviar correo de recuperación</button>
      </form>

      <p id="forgotMensaje" class="mensaje"></p>

      <p>
        ¿Recordaste tu contraseña?
        <button id="backToLoginBtn" type="button" class="btn secondary">Volver al login</button>
      </p>
    </section>

    <section id="trabajadorView" class="hidden">
      <div class="card">
        <div class="panel-top">
          <div>
            <h2>Panel Trabajador</h2>
            <p id="workerInfo"></p>
          </div>
          <button class="btn secondary" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>

        <form id="solicitudForm">
          <div class="field">
            <label for="fecha_inicio">Fecha de inicio</label>
            <input type="date" id="fecha_inicio" required />
          </div>

          <div class="field">
            <label for="fecha_fin">Fecha de fin</label>
            <input type="date" id="fecha_fin" required />
          </div>

          <div class="field">
            <label for="comentario">Comentario</label>
            <textarea id="comentario" rows="4"></textarea>
          </div>

          <button type="submit" class="btn primary">Enviar solicitud</button>
        </form>

        <p id="workerMensaje" class="mensaje"></p>
      </div>

      <div class="card mt">
        <h2>Mis solicitudes</h2>

        <div class="tabs-solicitudes">
          <button class="tab-btn active" data-tipo="pendientes">Pendientes</button>
          <button class="tab-btn" data-tipo="resueltas">Resueltas</button>
        </div>

        <div id="solicitudesTrabajador" class="solicitudes-lista"></div>
      </div>
    </section>

    <section id="jefeView" class="hidden">
      <div class="card">
        <div class="panel-top">
          <div>
            <h2>Panel Jefe</h2>
            <p id="bossInfo"></p>
          </div>
          <button class="btn secondary" onclick="cerrarSesion()">Cerrar sesión</button>
        </div>

        <button id="recargarBtn" class="btn primary">Recargar solicitudes</button>
        <div id="solicitudesLista" class="solicitudes-lista"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
