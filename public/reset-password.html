<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña - Vacation Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Vacation Manager</h1>
      <p>Restablecimiento de contraseña</p>
    </header>

    <section class="card">
      <h2>Nueva contraseña</h2>

      <form id="resetForm">
        <div class="field">
          <label for="newPassword">Nueva contraseña</label>
          <input type="password" id="newPassword" required />
        </div>

        <div class="field">
          <label for="confirmPassword">Confirmar contraseña</label>
          <input type="password" id="confirmPassword" required />
        </div>

        <button type="submit" class="btn primary">Guardar nueva contraseña</button>
      </form>

      <p id="resetMensaje" class="mensaje"></p>

      <p>
        ¿Volver al inicio?
        <a href="/" class="btn secondary" style="text-decoration: none; display: inline-block;">Ir al login</a>
      </p>
    </section>
  </div>

  <script>
    const resetForm = document.getElementById('resetForm');
    const resetMensaje = document.getElementById('resetMensaje');

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!token) {
        resetMensaje.textContent = 'Token no encontrado en el enlace.';
        resetMensaje.style.color = 'red';
        return;
      }

      if (password !== confirmPassword) {
        resetMensaje.textContent = 'Las contraseñas no coinciden.';
        resetMensaje.style.color = 'red';
        return;
      }

      try {
        const res = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();

        if (!res.ok) {
          resetMensaje.textContent = data.error || 'No se pudo restablecer la contraseña';
          resetMensaje.style.color = 'red';
          return;
        }

        resetMensaje.textContent = data.message || 'Contraseña actualizada correctamente';
        resetMensaje.style.color = 'green';
        resetForm.reset();
      } catch (error) {
        resetMensaje.textContent = 'Error de conexión con el servidor';
        resetMensaje.style.color = 'red';
      }
    });
  </script>
</body>
</html>
