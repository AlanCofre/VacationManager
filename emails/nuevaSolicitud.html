<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nueva solicitud</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family: Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding:20px;">
    <tr>
      <td align="center">

        <!-- Contenedor -->
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden;">
          
          <!-- Header -->
          <tr>
            <td style="background-color:#2c3e50; color:#ffffff; padding:20px; text-align:center;">
              <h2 style="margin:0;">Nueva Solicitud</h2>
            </td>
          </tr>

          <!-- Contenido -->
          <tr>
            <td style="padding:20px; color:#333333;">
              
              <p>Hola,</p>

              <p>Se ha generado una nueva solicitud de vacaciones con el siguiente detalle:</p>

              <table width="100%" cellpadding="10" cellspacing="0" style="border-collapse: collapse;">
                <tr>
                  <td style="border:1px solid #ddd;"><strong>Usuario</strong></td>
                  <td style="border:1px solid #ddd;">{{nombre}}</td>
                </tr>
                <tr>
                  <td style="border:1px solid #ddd;"><strong>Fecha inicio</strong></td>
                  <td style="border:1px solid #ddd;">{{fecha_inicio}}</td>
                </tr>
                <tr>
                  <td style="border:1px solid #ddd;"><strong>Fecha fin</strong></td>
                  <td style="border:1px solid #ddd;">{{fecha_fin}}</td>
                </tr>
                <tr>
                  <td style="border:1px solid #ddd;"><strong>Comentario</strong></td>
                  <td style="border:1px solid #ddd;">{{comentario}}</td>
                </tr>
              </table>

              <p style="margin-top:20px;">
                Por favor, revisa la solicitud en el sistema.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#ecf0f1; text-align:center; padding:15px; font-size:12px; color:#777;">
              Sistema de Gestión de Solicitudes
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
